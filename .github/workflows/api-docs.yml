name: deploy-api-docs
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
     uses: vapor/api-docs/.github/workflows/build-and-deploy-docs-workflow.yml@main
     secrets: inherit
     with:
       package_name: leaf
       modules: Leaf
       pathsToInvalidate: /leaf/*
